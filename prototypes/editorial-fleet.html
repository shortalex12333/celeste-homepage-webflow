<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial · Fleet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }

:root {
  --bg: linear-gradient(160deg, #181614 0%, #14110F 50%, #0C0B0A 100%);
  --bg-glow: radial-gradient(circle at 70% 25%, rgba(90,171,204,0.03), transparent 50%);
  --card-bg: rgba(30, 27, 24, 0.85);
  --card-border: rgba(255,255,255,0.06);
  --card-border-top: rgba(255,255,255,0.10);
  --card-shadow: 0 1px 0 rgba(0,0,0,0.40), 0 8px 24px rgba(0,0,0,0.30);
  --row-border: rgba(255,255,255,0.04);
  --row-hover: rgba(90,171,204,0.06);
  --txt: rgba(255,255,255,0.92);
  --txt-dim: rgba(255,255,255,0.55);
  --txt-ghost: rgba(255,255,255,0.35);
  --mono-dim: rgba(255,255,255,0.40);
  --teal: #5AABCC;
  --green: #4A9468;
  --amber: #C4893B;
  --red: #C0503A;
}
[data-theme="light"] {
  --bg: linear-gradient(160deg, #FEFEFE 0%, #F5F6F8 30%, #ECEEF2 65%, #E4E6EC 100%);
  --bg-glow: none;
  --card-bg: #FFFFFF;
  --card-border: rgba(0,0,0,0.05);
  --card-border-top: rgba(0,0,0,0.05);
  --card-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.05), 0 24px 64px rgba(0,0,0,0.04);
  --row-border: rgba(0,0,0,0.025);
  --row-hover: rgba(43,123,163,0.04);
  --txt: #1a1a1a;
  --txt-dim: #777;
  --txt-ghost: #999;
  --mono-dim: #aaa;
  --teal: #2B7BA3;
  --green: #3A7A55;
  --amber: #9A6B2E;
  --red: #A04030;
}

body {
  background: var(--bg);
  font-family: 'DM Sans', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: stretch;
  justify-content: stretch;
  padding: 16px;
  width: 400px;
  height: 250px;
  overflow: hidden;
  position: relative;
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--bg-glow);
  pointer-events: none;
}

.card {
  width: 100%;
  flex: 1;
  background: var(--card-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--card-border);
  border-top-color: var(--card-border-top);
  border-radius: 8px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

.f-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--row-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.f-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--txt-ghost);
}
.f-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--teal);
}

.f-row {
  padding: 12px 18px;
  border-bottom: 1px solid var(--row-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  flex: 1;
}
.f-row:last-child { border-bottom: none; }
.f-row.current { background: var(--row-hover); }
.f-name {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--txt);
  font-weight: 500;
}
.f-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.f-dot.amber { background: var(--amber); }
.f-dot.red { background: var(--red); }
.f-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--mono-dim);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="card">
  <div class="f-head">
    <div class="f-label">Your fleet</div>
    <div class="f-count">4 vessels</div>
  </div>
  <div class="f-row current">
    <div class="f-name"><span class="f-dot"></span>M/Y Andromeda</div>
    <div class="f-status">60m · operational</div>
  </div>
  <div class="f-row">
    <div class="f-name"><span class="f-dot"></span>M/Y Test Vessel</div>
    <div class="f-status">42m · operational</div>
  </div>
  <div class="f-row">
    <div class="f-name"><span class="f-dot amber"></span>S/Y Northern Star</div>
    <div class="f-status">38m · 1 open fault</div>
  </div>
  <div class="f-row">
    <div class="f-name"><span class="f-dot red"></span>M/Y Helios</div>
    <div class="f-status">52m · cert expiring</div>
  </div>
</div>
</body>
</html>
