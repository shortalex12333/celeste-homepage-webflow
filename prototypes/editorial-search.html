<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial · Search</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }

:root {
  --bg: linear-gradient(160deg, #181614 0%, #14110F 50%, #0C0B0A 100%);
  --bg-glow: radial-gradient(circle at 30% 25%, rgba(90,171,204,0.05), transparent 55%);
  --bar-bg: rgba(30, 27, 24, 0.85);
  --bar-border: rgba(255,255,255,0.08);
  --bar-border-top: rgba(255,255,255,0.12);
  --card-bg: rgba(30, 27, 24, 0.85);
  --card-border: rgba(255,255,255,0.06);
  --card-border-top: rgba(255,255,255,0.10);
  --card-shadow: 0 1px 0 rgba(0,0,0,0.40), 0 8px 24px rgba(0,0,0,0.30);
  --row-border: rgba(255,255,255,0.04);
  --txt: rgba(255,255,255,0.92);
  --txt-dim: rgba(255,255,255,0.55);
  --txt-ghost: rgba(255,255,255,0.35);
  --teal: #5AABCC;
  --teal-dim: rgba(90,171,204,0.60);
  --mono-dim: rgba(255,255,255,0.40);
}
[data-theme="light"] {
  --bg: radial-gradient(ellipse 120% 100% at 28% 20%, #FFFFFF 0%, #F8F6F2 35%, #F0ECE6 75%, #E8E3DC 100%);
  --bg-glow: none;
  --bar-bg: rgba(255,255,255,0.78);
  --bar-border: rgba(255,255,255,0.85);
  --bar-border-top: rgba(255,255,255,0.85);
  --card-bg: #FFFFFF;
  --card-border: rgba(0,0,0,0.05);
  --card-border-top: rgba(0,0,0,0.05);
  --card-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.04);
  --row-border: rgba(0,0,0,0.04);
  --txt: #1a1a1a;
  --txt-dim: #777;
  --txt-ghost: #bbb;
  --teal: #2B7BA3;
  --teal-dim: #2B7BA3;
  --mono-dim: #aaa;
}

body {
  background: var(--bg);
  font-family: 'DM Sans', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  padding: 16px;
  width: 400px;
  height: 250px;
  overflow: hidden;
  position: relative;
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--bg-glow);
  pointer-events: none;
}

.search-bar {
  background: var(--bar-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--bar-border);
  border-top-color: var(--bar-border-top);
  border-radius: 8px;
  box-shadow: var(--card-shadow);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  z-index: 1;
}
.s-icon { width: 14px; height: 14px; color: var(--teal); flex-shrink: 0; }
.s-text { font-size: 13px; color: var(--txt); flex: 1; }
.s-cursor {
  width: 1px; height: 14px;
  background: var(--teal);
  animation: blink 1s infinite;
}
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

.result-card {
  background: var(--card-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--card-border);
  border-top-color: var(--card-border-top);
  border-radius: 8px;
  box-shadow: var(--card-shadow);
  overflow: hidden;
  position: relative;
  z-index: 1;
}
.r-head {
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--row-border);
}
.r-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); }
.r-title {
  font-size: 10px; font-weight: 600;
  color: var(--teal-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.r-body { padding: 12px 16px 14px; }
.r-fault {
  font-size: 13px; color: var(--txt); font-weight: 500;
  margin-bottom: 5px;
}
.r-fault .ref {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: var(--mono-dim); margin-right: 6px;
}
.r-meta {
  font-size: 10px; color: var(--mono-dim);
  font-family: 'IBM Plex Mono', monospace;
}
</style>
</head>
<body>
<div class="search-bar">
  <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
  <div class="s-text">vibration port engine — last fix</div>
  <div class="s-cursor"></div>
</div>
<div class="result-card">
  <div class="r-head">
    <div class="r-dot"></div>
    <div class="r-title">Best match</div>
  </div>
  <div class="r-body">
    <div class="r-fault"><span class="ref">F-2847</span>Port engine high temp · resolved</div>
    <div class="r-meta">14 MAR 2026 · R. CHEN · 3 LINKED RECORDS</div>
  </div>
</div>
</body>
</html>
